services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: aipany
      POSTGRES_USER: aipany
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aipany-dev-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipany -d aipany"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  speaker-intelligence:
    build:
      context: ..
      dockerfile: services/speaker-intelligence/Dockerfile
    env_file:
      - ../.env
    restart: unless-stopped
    volumes:
      - speaker-models:/models

  realtime-gateway:
    build:
      context: ..
      dockerfile: services/realtime-gateway/Dockerfile
    env_file:
      - ../.env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      speaker-intelligence:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  speaker-models:
  postgres-data:
