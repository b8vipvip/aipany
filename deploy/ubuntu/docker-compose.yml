services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aipany}
      POSTGRES_USER: ${POSTGRES_USER:-aipany}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aipany} -d ${POSTGRES_DB:-aipany}"], interval: 10s, timeout: 5s, retries: 5}
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis-data:/data]
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 10s, timeout: 5s, retries: 5}
  admin-api:
    build: {context: ../.., dockerfile: services/admin-api/Dockerfile}
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aipany}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aipany}
      ADMIN_API_HOST: 0.0.0.0
      ADMIN_API_PORT: 3100
    depends_on: {postgres: {condition: service_healthy}}
    healthcheck: {test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/health || exit 1"], interval: 15s, timeout: 5s, retries: 5}
  voice-session:
    build: {context: ../.., dockerfile: services/voice-session/Dockerfile}
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aipany}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aipany}
      VOICE_SESSION_HOST: 0.0.0.0
      VOICE_SESSION_PORT: 3000
    depends_on: {postgres: {condition: service_healthy}}
    healthcheck: {test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"], interval: 15s, timeout: 5s, retries: 5}
  admin-web:
    build: {context: ../.., dockerfile: apps/admin-web/Dockerfile, args: {VITE_ADMIN_API_BASE_URL: /api/admin}}
  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes: [./Caddyfile:/etc/caddy/Caddyfile:ro, caddy-data:/data, caddy-config:/config]
    depends_on: [admin-web, admin-api, voice-session]
volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
