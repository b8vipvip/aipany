name: 代码检查

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: TypeScript 与测试
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        shell: bash
        run: |
          git -c init.defaultBranch=main init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --depth=1 origin "${GITHUB_SHA}"
          git checkout --quiet --detach FETCH_HEAD

      - name: 安装 pnpm
        run: npm install --global pnpm@10.12.1 --silent

      - name: 安装依赖
        run: pnpm install --no-frozen-lockfile --reporter=silent

      - name: TypeScript 类型检查
        run: pnpm typecheck

      - name: 运行测试
        run: pnpm test

      - name: Docker Build 校验
        run: |
          docker build -f services/admin-api/Dockerfile .
          docker build -f services/voice-session/Dockerfile .
          docker build -f apps/admin-web/Dockerfile .
