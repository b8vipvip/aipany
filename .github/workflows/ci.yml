name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: python3 -m py_compile services/speaker-intelligence/app/main.py
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
