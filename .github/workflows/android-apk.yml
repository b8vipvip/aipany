name: Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/android/**"
      - ".github/workflows/android-apk.yml"
  push:
    branches:
      - main
    paths:
      - "apps/android/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Run Android unit tests
        run: gradle -p apps/android testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: gradle -p apps/android assembleDebug --stacktrace

      - name: Prepare artifact
        run: |
          mkdir -p apps/android/dist
          cp apps/android/app/build/outputs/apk/debug/app-debug.apk apps/android/dist/Aipany-android-v0.1.0-debug.apk
          cd apps/android/dist
          sha256sum Aipany-android-v0.1.0-debug.apk > SHA256SUMS.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aipany-android-v0.1.0-debug
          path: apps/android/dist/*
          retention-days: 30
          if-no-files-found: error
