name: Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/android/**"
      - ".github/workflows/android-apk.yml"
  push:
    branches:
      - main
    paths:
      - "apps/android/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Run Android unit tests
        id: android_tests
        shell: bash
        run: |
          set +e
          gradle -p apps/android testDebugUnitTest --console=plain > /tmp/aipany-android-test.log 2>&1
          status=$?
          tail -n 180 /tmp/aipany-android-test.log
          exit $status

      - name: Build debug APK
        id: android_build
        shell: bash
        run: |
          set +e
          gradle -p apps/android assembleDebug --console=plain > /tmp/aipany-android-build.log 2>&1
          status=$?
          tail -n 180 /tmp/aipany-android-build.log
          exit $status

      - name: Upload Android failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aipany-android-v0.2.0-failure-logs
          path: |
            /tmp/aipany-android-test.log
            /tmp/aipany-android-build.log
          retention-days: 7
          if-no-files-found: warn

      - name: Prepare artifact
        if: success()
        run: |
          mkdir -p apps/android/dist
          cp apps/android/app/build/outputs/apk/debug/app-debug.apk apps/android/dist/Aipany-android-v0.2.0-debug.apk
          cd apps/android/dist
          sha256sum Aipany-android-v0.2.0-debug.apk > SHA256SUMS.txt

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aipany-android-v0.2.0-debug
          path: apps/android/dist/*
          retention-days: 30
          if-no-files-found: error
